<section class="compare-table-section">
  <h2>Comparison Table</h2>

  @if (rows.length > 0) {
    <table>
      <thead>
        <tr>
          @for (header of headers; track header) {
            <th>{{ header }}</th>
          }
        </tr>
      </thead>

      <tbody>
        @for (row of rows; track row) {
          <tr>
            @for (cell of row; track cell) {
              <td>{{ cell }}</td>
            }
          </tr>
        }
      </tbody>
    </table>
  } @else {
    <p class="empty-state">Select keyboards to compare.</p>
  }
</section>
